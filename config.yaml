project:
  seed: 42

paths:
  data_root: ./Рамановские спектры
  outputs: ./outputs

data:
  sample_agg_features: [median, mean, std, q25, q75]
  append_first_derivative: true
  include_region_feature: false
  centers_to_run: [1500, 2900]

  use_raw_cache: true
  force_reload_raw_cache: false

  use_aligned_cache: true
  force_rebuild_aligned_cache: false

  use_samplewise_cache: true
  force_rebuild_samplewise_cache: false

preprocessing:
  enabled: true

  crop_range: [700, 1800]

  crop_ranges_by_center:
    "1500": [700, 1800]
    "2900": [2600, 3200]

  despike_threshold: 6.0
  despike_window: 3
  smooth_window: 11
  smooth_polyorder: 3
  baseline_lam: 100000.0
  baseline_p: 0.01
  baseline_niter: 10
  normalization: l2

training:
  cv_strategy: stratified_group
  group_kfold_splits: 3

  datasets:
    samplewise: true
    pixelwise: false

  centers:
    "1500":
      enabled: true
      feature_config:
        sample_agg_features: [median, mean, std, q25, q75]
        append_first_derivative: true
        include_region_feature: false

      models:
        extra_trees: true
        catboost: true
        pls_logreg: true
        linear_svm: false
        pca_svm: false
        rf: false
        logreg: false

      ensemble:
        enabled: true
        name: ensemble_center1500
        members: [extra_trees, catboost, pls_logreg]
        weighting: oof_macro_f1

      extra_trees:
        n_estimators: 1200
        max_depth: null
        min_samples_split: 4
        min_samples_leaf: 2
        max_features: sqrt
        class_weight: balanced_subsample

      catboost:
        iterations: 600
        depth: 5
        learning_rate: 0.04
        thread_count: 1
        l2_leaf_reg: 5.0
        subsample: 0.9
        auto_class_weights: Balanced

      pls_logreg:
        n_components_grid: [2, 3, 5, 8, 10, 15, 20]
        C: 1.0
        class_weight: balanced
        max_iter: 5000

      pbt:
        enabled: true
        models: [extra_trees, catboost, pls_logreg]
        population_size: 6
        generations: 3
        exploit_top_fraction: 0.5
        mutation_prob: 0.8
        random_state: 42
        search_spaces:
          extra_trees:
            n_estimators: [400, 600, 900, 1200, 1500]
            min_samples_split: [2, 4, 6, 8]
            min_samples_leaf: [1, 2, 3, 4]
            max_features: [sqrt, log2, 0.5, 0.75]
            class_weight: [balanced, balanced_subsample]
          catboost:
            iterations: [300, 450, 600, 800]
            depth: [3, 4, 5, 6]
            learning_rate: [0.02, 0.03, 0.05, 0.07]
            l2_leaf_reg: [3.0, 5.0, 7.0, 9.0]
            subsample: [0.7, 0.8, 0.9, 1.0]
          pls_logreg:
            n_components: [2, 3, 5, 8, 10, 15, 20]
            C: [0.1, 0.3, 0.7, 1.0, 2.0, 5.0, 10.0]
            class_weight: [balanced, null]

    "2900":
      enabled: true
      feature_config:
        sample_agg_features: [median, mean, std, q25, q75]
        append_first_derivative: true
        include_region_feature: false

      models:
        extra_trees: true
        catboost: true
        pls_logreg: true
        linear_svm: false
        pca_svm: false
        rf: false
        logreg: false

      ensemble:
        enabled: true
        name: ensemble_center2900
        members: [extra_trees, catboost, pls_logreg]
        weighting: oof_macro_f1

      extra_trees:
        n_estimators: 900
        max_depth: null
        min_samples_split: 4
        min_samples_leaf: 3
        max_features: sqrt
        class_weight: balanced_subsample

      catboost:
        iterations: 450
        depth: 4
        learning_rate: 0.05
        thread_count: 1
        l2_leaf_reg: 7.0
        subsample: 0.9
        auto_class_weights: Balanced

      pls_logreg:
        n_components_grid: [2, 3, 5, 8, 10, 15, 20]
        C: 1.0
        class_weight: balanced
        max_iter: 5000

      pbt:
        enabled: true
        models: [extra_trees, catboost, pls_logreg]
        population_size: 6
        generations: 3
        exploit_top_fraction: 0.5
        mutation_prob: 0.8
        random_state: 42
        search_spaces:
          extra_trees:
            n_estimators: [300, 500, 700, 900, 1200]
            min_samples_split: [2, 4, 6, 8]
            min_samples_leaf: [1, 2, 3, 4]
            max_features: [sqrt, log2, 0.5, 0.75]
            class_weight: [balanced, balanced_subsample]
          catboost:
            iterations: [250, 350, 450, 650]
            depth: [3, 4, 5, 6]
            learning_rate: [0.02, 0.03, 0.05, 0.07, 0.1]
            l2_leaf_reg: [3.0, 5.0, 7.0, 9.0]
            subsample: [0.7, 0.8, 0.9, 1.0]
          pls_logreg:
            n_components: [2, 3, 5, 8, 10, 15, 20]
            C: [0.1, 0.3, 0.7, 1.0, 2.0, 5.0, 10.0]
            class_weight: [balanced, null]

  late_fusion:
    enabled: true
    name: late_fusion_1500_2900
    centers: [1500, 2900]
    weighting: oof_macro_f1

interpretation:
  rf_top_k: 30
